
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>NeatDuck_Timeline v1.0.7</title>
  <meta name="viewport" content="width=1320, initial-scale=1">
  <link rel="stylesheet" href="timeline.css">
</head>
<body style="background:#f6f8fa; margin:20px; font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;">
  <div id="ld-timeline-wrapper">
    <div id="ld-topbar">
      <div class="row nd-tabs" role="tablist" aria-label="NeatDuck tabs">
        <button class="btn nd-main-tab active" data-main-tab="calendar"><span data-i18n="tabCalendar">Activity Calendar</span></button>
        <button class="btn nd-main-tab" data-main-tab="types"><span data-i18n="tabTypes">属性克制</span></button>
        <button class="btn nd-main-tab" data-main-tab="pokedex"><span data-i18n="tabPokedex">宝可梦图鉴</span></button>
        <button class="btn nd-main-tab" data-main-tab="max"><span data-i18n="tabMax">极巨化</span></button>
      </div>
      <div class="row nd-control-row">
        <div class="nd-left-controls" data-calendar-controls>
          <button class="btn" data-act="today">🎯 <span data-i18n="today">今天</span></button>
          <button class="btn" data-act="reset-week">📆 <span data-i18n="resetWeek">本周</span></button>
          <button class="btn" data-act="reset-month">🗓️ <span data-i18n="resetMonth">本月</span></button>
          <button class="btn" data-act="toggle-calendar-view">↔️ <span data-i18n="toggleCalendarView">Timeline / Month</span></button>
          <span class="nd-view-pill" id="ld-current-view" data-i18n="currentViewLinear">Current: Timeline</span>
          <button class="btn" data-act="remote-update">☁️ <span data-i18n="remoteUpdate">云端更新</span></button>
        </div>
        <div class="nd-common-controls">
          <select class="btn" id="ld-lang-select" title="Language">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
          </select>
          <label class="nd-tz-inline">🌐 <span data-i18n="timeZone">Time Zone</span> <select class="btn" id="ld-tz-select"></select></label>
          <button class="btn" data-act="settings">⚙️ <span data-i18n="settings">设置</span></button>
          <button class="btn" data-act="export-events-csv">📤 <span data-i18n="exportCSVEvents">导出活动CSV</span></button>
          <button class="btn" data-act="export-ics">🗓️ <span data-i18n="exportICS">导出日历ICS</span></button>
          <button class="btn" data-act="email-log">📨 <span data-i18n="emailLog">邮件日志</span></button>
          <button class="btn" data-act="clear-selection">🧹 <span data-i18n="clearSelection">清除选择</span></button>
        </div>
      </div>
    </div>
    <div id="ld-left"><svg id="ld-legend-svg" viewBox="0 0 240 642" preserveAspectRatio="xMinYMin"></svg></div>
    <div id="ld-right">
      <svg id="ld-timeline-svg" viewBox="0 0 1040 642" preserveAspectRatio="xMinYMin">
        <g id="ld-month-bgs"></g>
        <g id="ld-weekend-bgs"></g>
        <g id="ld-period-blocks"></g>
        <g id="ld-ruler-top" class="ld-ruler"></g>
        <g id="ld-ruler-bottom" class="ld-ruler"></g>
        <g id="ld-lane-seps"></g>
        <g id="ld-items"></g>
        <g id="ld-now"><line class="ld-now" y1="0" y2="642"/></g>
      </svg>
      <div id="ld-extenders"></div>
      <div id="ld-monthgrid" style="display:none;"></div>
    </div>
    <div class="ld-modal-mask" id="ld-mask"></div>
    <div class="ld-modal" id="ld-colors-modal"><h3 data-i18n="colors">颜色</h3><div id="ld-colors-rows"></div><div class="footer"><button class="btn" data-close="colors"><span data-i18n="ok">确定</span></button></div></div>
    <div class="ld-modal" id="ld-settings-modal"><h3 data-i18n="settings">设置</h3><div id="ld-settings-body"></div><div class="footer"><button class="btn" data-save="settings"><span data-i18n="apply">应用</span></button><button class="btn" data-close="settings"><span data-i18n="ok">确定</span></button></div></div>
    <div class="ld-modal" id="ld-updates-modal"><h3 data-i18n="updates">检测到更新</h3><div id="ld-updates-body"></div><div class="footer"><button class="btn" data-apply="updates"><span data-i18n="apply">应用</span></button><button class="btn" data-close="updates"><span data-i18n="ignore">忽略</span></button></div></div>
  </div>
  <script src="core.js"></script>
  <script src="info.js"></script>
  <script src="standalone.js"></script>
</body>
</html>
